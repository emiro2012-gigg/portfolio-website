<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="referrer" content="no-referrer">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta property="og:title" content="Full Menu — Interactive Menu">
<meta property="og:description" content="Интерактивное меню с корзиной и фильтрами. Мой первый проект в портфолио.">
<meta property="og:image" content="https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=800">
<meta property="og:type" content="website">
  <title>  Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    body { 
  font-family: 'Inter', sans-serif; 
  background: linear-gradient(180deg, #ffffff 0%, #f8f9fb 100%);
  -webkit-tap-highlight-color: transparent; 
  scroll-behavior: smooth; 
}
    .no-scrollbar::-webkit-scrollbar { display: none; }
    #active-bg { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    
    .nav-link { 
        position: relative;
        z-index: 10;
        padding: 8px 20px;
        border-radius: 9999px;
        background-color: #F1F3F5;
        color: #2D2E3E !important;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        white-space: nowrap;
    }
    .nav-link.active { color: #ffffff !important; background-color: transparent !important; }
    .filter-btn { color: #5C5E66; }
    .filter-btn.active-filter { background-color: #F1F3F5; box-shadow: inset 0 0 0 1px #8BC34A; }
    #cart-modal { transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }

   
    .menu-grid {
        display: grid;
       
        grid-template-columns: repeat(2, 1fr); 
        gap: 16px;
        row-gap: 40px;
    }

    @media (min-width: 768px) {

        .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }
    }

    @media (min-width: 1024px) {
       
        .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 40px; }
    }

   
    @media (max-width: 640px) {
        #filter-row { font-size: 11px; }
        .filter-btn { padding: 4px 10px; }
        header { padding-top: env(safe-area-inset-top); }
        #cart-trigger { width: 92%; bottom: 20px; }
    }

    #nav-container { display: flex; align-items: center; min-height: 44px; }

    section {
  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 0.6s ease forwards;
}

input {
  font-size: 16px;
}

.modal-open {
  overflow: hidden;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}


    img {
  transition: transform 0.5s ease, box-shadow 0.5s ease;
}
</style>

<header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md">
  <div class="px-4 py-3 flex items-center justify-between border-b border-gray-50">
    <span class="text-[20px] font-bold text-gray-900">Фильтры</span>
    <div id="filter-row" class="flex gap-2 overflow-x-auto no-scrollbar ml-4">
      <button onclick="setFilter('Все')" class="filter-btn active-filter px-3 py-1 bg-[#F1F3F5] rounded-full text-[12px] font-medium transition-all">Все</button>
      <button onclick="setFilter('⭐')" class="filter-btn px-3 py-1 bg-[#F1F3F5] rounded-full text-[12px] font-medium flex items-center gap-1 transition-all">
        <span class="w-4 h-4 bg-[#8BC34A] text-white rounded-full flex items-center justify-center text-[10px]">★</span> Хиты
      </button>
      <button onclick="setFilter('🌿')" class="filter-btn px-3 py-1 bg-[#F1F3F5] rounded-full text-[12px] font-medium flex items-center gap-1 transition-all">
        <span class="w-4 h-4 bg-[#8BC34A] text-white rounded-full flex items-center justify-center text-[8px]">NEW</span> Новинки
      </button>
      <button onclick="setFilter('👶')" class="filter-btn px-3 py-1 bg-[#F1F3F5] rounded-full text-[12px] font-medium flex items-center gap-1 transition-all">
        <span class="w-4 h-4 bg-[#8BC34A] text-white rounded-full flex items-center justify-center text-[10px]">☺</span> Детям
      </button>
      <button onclick="setFilter('💪')" class="filter-btn px-3 py-1 bg-[#F1F3F5] rounded-full text-[12px] font-medium flex items-center gap-1 transition-all">
        <span class="w-4 h-4 bg-[#8BC34A] text-white rounded-full flex items-center justify-center text-[10px]">⚖</span> Для спортсменов
      </button>
    </div>
  </div>

  <nav class="px-4 py-4 overflow-x-auto no-scrollbar border-b border-gray-100 shadow-sm">
    <div id="nav-container" class="flex gap-2 relative min-w-max items-center">
      <div id="active-bg" class="absolute h-full bg-[#2D2E3E] rounded-full z-0 transition-all duration-300"></div>
    </div>
  </nav>
</header>

<main id="menu-content" class="px-4 pt-6 pb-40 space-y-16"></main>

<div id="cart-trigger" onclick="toggleCart(true)" 
class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-[#8E24AA] text-white p-2 rounded-[2.5rem] shadow-2xl flex items-center justify-between translate-y-40 transition-transform duration-500 z-50">

  <div id="cart-previews" class="flex -space-x-3 ml-3"></div>

  <div class="bg-white/20 px-8 py-4 rounded-full flex items-center gap-2">
    <span id="trigger-price" class="text-xl font-black">0</span>
    <span class="text-[10px] font-black uppercase opacity-80">сом</span>
  </div>

</div>

<div id="cart-modal" class="fixed inset-0 bg-white translate-y-full flex flex-col">
  
 
  <div class="p-5 flex justify-between items-center border-b">
    <h2 class="text-xl font-black text-[#8E24AA] uppercase">Корзина</h2>
    <button onclick="toggleCart(false)" class="w-10 h-10 rounded-full bg-gray-100 font-black text-lg">✕</button>
  </div>
  

  <div id="cart-items-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
  

  <div class="p-5 border-t bg-gray-50 pb-[env(safe-area-inset-bottom)]">
    
    <div class="flex justify-between items-center mb-4">
      <span class="text-sm font-bold text-gray-400 uppercase">Итого</span>
      <span class="text-2xl font-black">
        <span id="modal-total-price">0</span> сом
      </span>
    </div>
    
    <button onclick="clearCart()" 
      class="w-full mb-3 border border-[#8E24AA] text-[#8E24AA] py-3 rounded-2xl font-bold hover:bg-[#8E24AA] hover:text-white transition">
      Очистить корзину
    </button>
    
    <button class="w-full bg-[#8E24AA] text-white py-4 rounded-2xl font-black uppercase">
      Заказать
    </button>
    
  </div>
</div>

function clearCart() {
  cart = {};
  localStorage.removeItem("cart");
  updateCartUI();
}


let cart = {};
let currentFilter = 'Все';

function setFilter(tag) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active-filter');
    if (btn.innerText.includes(tag) || (tag === 'Все' && btn.innerText === 'Все')) btn.classList.add('active-filter');
  });
  renderMenu();
}

function addToCart(id) {
  const product = menuData.flatMap(section => section.items).find(item => item.id === id);
  
  if (!product) return;

  if (cart[id]) {
    cart[id].count++;
  } else {
    cart[id] = { ...product, count: 1 };
  }
  updateCartUI();
}

function changeCount(id, delta) {
  if (cart[id]) {
    cart[id].count += delta;
    if (cart[id].count <= 0) delete cart[id];
    updateCartUI();
  }
}

function updateCartUI() {
  const trigger = document.getElementById("cart-trigger");
  const previewContainer = document.getElementById("cart-previews");
  const triggerPrice = document.getElementById("trigger-price");
  const modalList = document.getElementById("cart-items-list");
  const modalTotal = document.getElementById("modal-total-price");
  
  let totalItems = 0; let totalPrice = 0;
  previewContainer.innerHTML = ""; modalList.innerHTML = "";

  Object.keys(cart).forEach(id => {
    const item = cart[id];
    totalItems += item.count; totalPrice += item.price * item.count;

    const img = document.createElement("img");
    img.src = item.img;
    img.className = "w-12 h-12 rounded-full border-4 border-[#8E24AA] object-cover bg-white";
    previewContainer.appendChild(img);

    modalList.innerHTML += `
      <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl">
        <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
        <div class="flex-1">
          <h4 class="font-bold text-sm leading-tight text-[#2D2E3E]">${item.name}</h4>
          <p class="text-[#8E24AA] font-black">${item.price} сом</p>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="changeCount(${id}, -1)" class="w-8 h-8 rounded-full bg-white shadow-sm font-black">-</button>
          <span class="font-bold">${item.count}</span>
          <button onclick="changeCount(${id}, 1)" class="w-8 h-8 rounded-full bg-white shadow-sm font-black">+</button>
        </div>
      </div>`;
  });

  triggerPrice.textContent = totalPrice;
  modalTotal.textContent = totalPrice;
  if (totalItems > 0) trigger.classList.remove("translate-y-40");
  else { trigger.classList.add("translate-y-40"); toggleCart(false); }

      localStorage.setItem("cart", JSON.stringify(cart));
}

function toggleCart(show) {
  const modal = document.getElementById("cart-modal");
  if (show && Object.keys(cart).length > 0) {
    modal.classList.remove("translate-y-full");
    document.body.classList.add("modal-open");
  } else {
    modal.classList.add("translate-y-full");
    document.body.classList.remove("modal-open");
  }
}

function renderMenu() {
  const container = document.getElementById("menu-content");
  const nav = document.getElementById("nav-container");

  container.innerHTML = '';
  nav.innerHTML = '<div id="active-bg" class="absolute h-full bg-[#2D2E3E] rounded-full z-0 transition-all duration-300"></div>';

  menuData.forEach((section) => {
    const filtered = section.items.filter(item => 
      currentFilter === 'Все' || item.icon === currentFilter
    );

    if (filtered.length === 0) return;


    const btn = document.createElement("button");
    btn.className = `nav-link`;
    btn.textContent = section.name;
    btn.dataset.target = section.id;
    btn.onclick = () =>
      window.scrollTo({
        top: document.getElementById(section.id).offsetTop - 140,
        behavior: 'smooth'
      });

    nav.appendChild(btn);

  
    const s = document.createElement("section");
    s.id = section.id;
    s.className = "scroll-mt-40 mb-24 opacity-0 translate-y-10 transition-all duration-700";

    s.innerHTML = `
      <h2 class="text-3xl md:text-4xl font-black mb-14 text-[#1a1a1a] px-2 tracking-tight">
        ${section.name}
      </h2>

      <div class="menu-grid">
        ${filtered.map(item => `
          <div class="flex flex-col items-center text-center group transition-all duration-500 hover:-translate-y-2">
            
            <div class="relative mb-8 w-full max-w-[280px] mx-auto">
              
              <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-[#8E24AA]/20 to-[#8BC34A]/20 blur-2xl opacity-0 group-hover:opacity-100 transition duration-500"></div>

              <img src="${item.img}" 
                   class="relative w-full aspect-square rounded-full object-cover shadow-lg group-hover:shadow-2xl transition duration-500">

              <div class="absolute top-2 right-2 w-10 h-10 bg-gradient-to-tr from-[#8BC34A] to-[#4CAF50] text-white rounded-full flex items-center justify-center text-lg border-2 border-white shadow-md">
                ${item.icon}
              </div>

              <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 bg-white px-4 py-1 rounded-full text-[11px] text-gray-500 shadow-lg border font-black whitespace-nowrap">
                ${item.weight}
              </div>
            </div>

            <h3 class="text-[17px] md:text-[20px] font-extrabold leading-tight mb-6 min-h-[60px] flex items-center justify-center px-3">
              ${item.name}
            </h3>

            <button onclick="addToCart(${item.id})"
              class="group flex items-center gap-3 
              bg-gradient-to-r from-[#2D2E3E] to-[#44455A] 
              text-white px-7 py-3 rounded-full 
              shadow-lg hover:shadow-2xl 
              hover:scale-105 active:scale-95 
              transition-all duration-300">
              
              <span class="text-xl font-light group-hover:rotate-90 transition duration-300">
                +
              </span>

              <span class="text-[14px] font-bold whitespace-nowrap">
                ${item.price} сом
              </span>
            </button>

          </div>
        `).join("")}
      </div>
    `;

    container.appendChild(s);

 
    setTimeout(() => {
      s.classList.remove("opacity-0", "translate-y-10");
    }, 100);
  });

  setTimeout(updateNav, 100);
} 


function updateNav() {
  const sections = document.querySelectorAll("section");
  const links = document.querySelectorAll(".nav-link");
  const bg = document.getElementById("active-bg");
  if(!bg || sections.length === 0) return;
  let currentId = "";
  sections.forEach(s => { if (window.pageYOffset >= s.offsetTop - 180) currentId = s.id; });
  if (!currentId) currentId = sections[0].id;
  links.forEach(l => {
    l.classList.remove("active");
    if (l.dataset.target === currentId) {
      l.classList.add("active");
      bg.style.width = l.offsetWidth + "px";
      bg.style.left = l.offsetLeft + "px";
      l.parentElement.parentElement.scrollTo({ left: l.offsetLeft - 100, behavior: 'smooth' });
    }
  });
}

window.onload = () => {
  const saved = localStorage.getItem("cart");
  if (saved) cart = JSON.parse(saved);
  renderMenu();
  updateCartUI();
  localStorage.setItem("cart", JSON.stringify(cart));
};  

window.addEventListener("scroll", updateNav);
window.onload = () => {
  const savedCart = localStorage.getItem("cart");
  if (savedCart) {
    cart = JSON.parse(savedCart);
  }
  renderMenu();
  updateCartUI();
};
</script>
